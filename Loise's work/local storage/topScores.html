<!DOCTYPE html>
<html>
    <head>
        <title>Head Scores</title>
    </head>
    <body>
<input id="nameInput" placeholder="Your name">
<button onclick="saveScore()">Save Score</button>
<table id="highScores">
  <tr><th>Name</th><th>Score</th></tr>
</table>
<script>
  let scores = JSON.parse(localStorage.getItem('highScores')) || [];
  const nameInput = document.getElementById('nameInput');
  
  function renderScores() {
    const table = document.getElementById('highScores');
    const top5 = scores.sort((a,b) => b.score - a.score).slice(0,5);
    table.innerHTML += top5.map(s => `<tr><td>${s.name}</td><td>${s.score}</td></tr>`).join('');
  }
  
  function saveScore() {
    const score = Math.floor(Math.random() * 10000);
    scores.push({ name: nameInput.value, score });
    localStorage.setItem('highScores', JSON.stringify(scores));
    renderScores();
  }
  
  renderScores();
</script>
    </body>
</html>
